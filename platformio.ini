; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Shared across every env — keeps build toolchain, board, and the version
; pre-build script in one place. Each [env:*] below extends [common].
[common]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/version.py

; Production firmware. ESP32 DevKit v1 + Si4732 SSB + Waveshare 2.8" ST7789V
; TFT shield (XPT2046 resistive touch) + rotary encoder. The sole shipping
; variant — the legacy 128x64 OLED build was retired in favour of focusing
; the parity effort on the TFT UX.
;   pio run -e esp32dev -t upload
[env:esp32dev]
extends = common
build_src_filter = +<main.cpp> +<radio.cpp> +<input.cpp> +<menu.cpp> +<persist.cpp>
build_flags =
	-DUSER_SETUP_LOADED=1
	-include "${PROJECT_DIR}/include/User_Setup.h"
lib_deps =
	pu2clr/PU2CLR SI4735@^2.1.8
	bodmer/TFT_eSPI@^2.5.43
	igorantolic/Ai Esp32 Rotary Encoder@^1.7

; Dedicated bring-up env for the Waveshare 2.8" TFT Touch Shield Rev 2.1.
; Stand-alone test fixture (phase1..6 + touch calibration) — not a product,
; not published by the release workflow. See docs/display_shield_test.md.
;   pio run -e shield_test -t upload
;   pio device monitor -b 115200 -e shield_test
[env:shield_test]
extends = common
build_src_filter = -<*> +<test_shield.cpp>
build_flags =
	-DUSER_SETUP_LOADED=1
	-include "${PROJECT_DIR}/include/User_Setup.h"
lib_deps =
	bodmer/TFT_eSPI@^2.5.43
