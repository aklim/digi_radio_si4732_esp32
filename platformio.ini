; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
extra_scripts = pre:scripts/version.py
; test_shield.cpp belongs to the shield_test env (needs TFT_eSPI); exclude it
; here so pio run -e esp32dev builds only the production radio firmware.
build_src_filter = +<*> -<test_shield.cpp>
lib_deps =
	pu2clr/PU2CLR SI4735@^2.1.8
	adafruit/Adafruit SSD1306@^2.5.16
	adafruit/Adafruit GFX Library@^1.12.6
	igorantolic/Ai Esp32 Rotary Encoder@^1.7

; Dedicated bring-up env for the Waveshare 2.8" TFT Touch Shield Rev 2.1.
; Uses Bodmer's TFT_eSPI (faster than Adafruit — DMA, smooth fonts, sprites).
; Config lives in include/User_Setup.h and is force-included via build_flags
; so we never touch files inside the TFT_eSPI library itself.
;   pio run -e shield_test -t upload
;   pio device monitor -b 115200 -e shield_test
[env:shield_test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/version.py
build_src_filter = -<*> +<test_shield.cpp>
build_flags =
	-DUSER_SETUP_LOADED=1
	-include "${PROJECT_DIR}/include/User_Setup.h"
lib_deps =
	bodmer/TFT_eSPI@^2.5.43
