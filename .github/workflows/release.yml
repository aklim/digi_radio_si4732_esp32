name: Release

# Triggered by pushing a Semantic Version tag (vMAJOR.MINOR.PATCH) to any
# branch. Builds every product firmware variant (esp32dev, esp32dev_tft) in
# parallel and publishes a single GitHub Release with all compiled .bin/.elf
# attached. See docs/releasing.md for the full runbook.
#
# `shield_test` is intentionally excluded — it is a bring-up fixture, not a
# product (see CLAUDE.md).
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write  # required to create Releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        env: [esp32dev, esp32dev_tft]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          # scripts/version.py runs `git describe --tags`, which requires the
          # full history; the default shallow clone would not see the tag.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware (${{ matrix.env }})
        run: pio run -e ${{ matrix.env }}

      - name: Stage release artifact
        run: |
          mkdir -p release
          TAG="${GITHUB_REF_NAME}"
          ENV="${{ matrix.env }}"
          cp ".pio/build/${ENV}/firmware.bin" "release/digi_radio-${TAG}-${ENV}.bin"
          cp ".pio/build/${ENV}/firmware.elf" "release/digi_radio-${TAG}-${ENV}.elf"
          ls -la release/

      - name: Verify firmware identity string
        # Sanity-check: the tag name must appear inside the embedded FW=
        # string, otherwise version.h was generated from a wrong git state.
        # No line anchor — `strings` can merge FW= with an adjacent printable
        # byte in the preceding rodata blob.
        run: |
          TAG="${GITHUB_REF_NAME}"
          ENV="${{ matrix.env }}"
          if ! strings "release/digi_radio-${TAG}-${ENV}.elf" | grep -q "FW=${TAG} "; then
            echo "::error::FW_IDENTITY does not contain tag ${TAG} in ${ENV} build"
            strings "release/digi_radio-${TAG}-${ENV}.elf" | grep 'FW=' || true
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.env }}
          path: release/
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all matrix artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: List artifacts
        run: ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
